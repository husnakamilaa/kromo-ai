<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kromo-AI Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">🌿</div>
                    <div>
                        <h1 class="logo-text">Kromo<span>-AI</span></h1>
                        <p class="logo-subtitle">Digital Guardian</p>
                    </div>
                </div>
                <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Profile Card -->
        <div class="card profile-card" id="profileCard" style="display:none;">
            <div class="profile-avatar" id="profilePic">👤</div>
            <div class="profile-info">
                <div class="profile-name" id="profileName">Guest</div>
                <div class="profile-status">
                    <span class="status-dot"></span>
                    Terhubung ke Kromo-AI
                </div>
            </div>
        </div>

        <!-- API Key Section -->
        <div class="card">
            <label class="input-label" for="apiKey">
                <span class="label-icon">🔑</span>
                Gemini API Key
            </label>
            <div class="input-wrapper">
                <input type="password" id="apiKey" class="input-field" placeholder="AIzaSy... atau ketik TEST">
                <button class="input-toggle" id="toggleKey" title="Show/Hide Key">
                    <span id="eyeIcon">👁</span>
                </button>
            </div>
            <p class="input-hint">Dapatkan di <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a></p>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
            <button class="btn btn-primary" id="saveBtn">
                <span class="btn-icon">💾</span>
                Simpan Pengaturan
            </button>
            <button class="btn btn-google" id="loginBtn">
                <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)"><path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/><path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/><path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/><path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/></g></svg>
                Login dengan Google
            </button>
        </div>

        <!-- Status Message -->
        <div class="status-message" id="status"></div>

        <!-- Footer Info -->
        <div class="footer-info">
            <div class="footer-icon">🛡️</div>
            <p>Kromo-AI membantu menjaga etika berkomentarmu di media sosial secara real-time.</p>
        </div>

        <!-- Stats Section -->
        <div class="card stats-card" id="statsCard" style="display:none;">
            <div class="stats-title">📊 Statistik Hari Ini</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">Dianalisis</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number stat-caution" id="statCaution">0</div>
                    <div class="stat-label">Peringatan</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number stat-harmful" id="statHarmful">0</div>
                    <div class="stat-label">Berbahaya</div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
